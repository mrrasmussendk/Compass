name: build-pack

on:
  push:
    branches: ["main", "master"]
  pull_request:
  workflow_dispatch:
    inputs:
      bump_and_publish:
        description: "Bump version and publish to NuGet"
        required: false
        type: boolean
        default: false

concurrency:
  group: build-pack-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ── CI: build & test on every platform ──────────────────────────────
  build-test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore Vitruvian.sln

      - name: Build
        run: dotnet build Vitruvian.sln -c Release --no-restore

      - name: Test
        run: dotnet test Vitruvian.sln -c Release --no-build --filter "FullyQualifiedName!~PackagingTests"

  # ── CD: pack, publish, and upload artifacts ─────────────────────────
  deploy:
    needs: build-test
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Bump package versions
        if: inputs.bump_and_publish == true
        run: |
          python3 <<'PY'
          import re
          import xml.etree.ElementTree as ET
          from pathlib import Path

          projects = [
              Path("src/Vitruvian.Abstractions/Vitruvian.Abstractions.csproj"),
              Path("src/Vitruvian.Runtime/Vitruvian.Runtime.csproj"),
              Path("src/Vitruvian.PluginSdk/Vitruvian.PluginSdk.csproj"),
              Path("src/Vitruvian.PluginHost/Vitruvian.PluginHost.csproj"),
              Path("src/Vitruvian.Hitl/Vitruvian.Hitl.csproj"),
              Path("src/Vitruvian.StandardModules/Vitruvian.StandardModules.csproj"),
              Path("src/Vitruvian.Framework/Vitruvian.Framework.csproj"),
              Path("src/Vitruvian.Cli/Vitruvian.Cli.csproj"),
              Path("src/Vitruvian.WeatherModule/Vitruvian.WeatherModule.csproj"),
          ]

          for project in projects:
              content = project.read_text(encoding="utf-8")
              root = ET.fromstring(content)
              version_element = root.find(".//Version")
              if version_element is None or not version_element.text:
                  raise ValueError(f"Could not find <Version> in {project}")

              version_text = version_element.text.strip()
              parts = version_text.split(".")
              if len(parts) != 3 or not all(part.isdigit() for part in parts):
                  raise ValueError(
                      f"Invalid version format in {project}: expected major.minor.patch, got {version_text}"
                  )

              major, minor, patch = map(int, parts)
              if patch < 9:
                  patch += 1
              else:
                  patch = 0
                  if minor < 9:
                      minor += 1
                  else:
                      minor = 0
                      major += 1

              new_version = f"{major}.{minor}.{patch}"
              print(f"{project}: {version_element.text} -> {new_version}")
              updated = re.sub(
                  r"(<Version>\s*)"
                  + re.escape(version_element.text)
                  + r"(\s*</Version>)",
                  rf"\g<1>{new_version}\g<2>",
                  content,
                  count=1,
              )
              project.write_text(updated, encoding="utf-8")
          PY

      - name: Commit version bump
        if: inputs.bump_and_publish == true
        run: |
          set -euo pipefail
          if git diff --quiet; then
            echo "No version changes detected."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/Vitruvian.Abstractions/Vitruvian.Abstractions.csproj src/Vitruvian.Runtime/Vitruvian.Runtime.csproj src/Vitruvian.PluginSdk/Vitruvian.PluginSdk.csproj src/Vitruvian.PluginHost/Vitruvian.PluginHost.csproj src/Vitruvian.Hitl/Vitruvian.Hitl.csproj src/Vitruvian.StandardModules/Vitruvian.StandardModules.csproj src/Vitruvian.Framework/Vitruvian.Framework.csproj src/Vitruvian.Cli/Vitruvian.Cli.csproj src/Vitruvian.WeatherModule/Vitruvian.WeatherModule.csproj
          git commit -m "chore: bump package versions [skip ci]"
          git push

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore Vitruvian.sln

      - name: Build
        run: dotnet build Vitruvian.sln -c Release --no-restore

      - name: Pack Vitruvian tool
        run: dotnet pack src/Vitruvian.Cli/Vitruvian.Cli.csproj -c Release --no-build -o artifacts

      - name: Pack Vitruvian Framework
        run: dotnet pack src/Vitruvian.Framework/Vitruvian.Framework.csproj -c Release --no-build -o artifacts

      - name: Pack Abstractions
        run: dotnet pack src/Vitruvian.Abstractions/Vitruvian.Abstractions.csproj -c Release --no-build -o artifacts

      - name: Pack Runtime
        run: dotnet pack src/Vitruvian.Runtime/Vitruvian.Runtime.csproj -c Release --no-build -o artifacts

      - name: Pack Plugin SDK
        run: dotnet pack src/Vitruvian.PluginSdk/Vitruvian.PluginSdk.csproj -c Release --no-build -o artifacts

      - name: Pack Plugin Host
        run: dotnet pack src/Vitruvian.PluginHost/Vitruvian.PluginHost.csproj -c Release --no-build -o artifacts

      - name: Pack HITL
        run: dotnet pack src/Vitruvian.Hitl/Vitruvian.Hitl.csproj -c Release --no-build -o artifacts

      - name: Pack Standard Modules
        run: dotnet pack src/Vitruvian.StandardModules/Vitruvian.StandardModules.csproj -c Release --no-build -o artifacts

      - name: Pack Weather module
        run: dotnet pack src/Vitruvian.WeatherModule/Vitruvian.WeatherModule.csproj -c Release --no-build -o artifacts

      - name: Publish to NuGet
        if: inputs.bump_and_publish == true || (github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'))
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: |
          set -euo pipefail
          if [ -z "$NUGET_API_KEY" ]; then
            echo "::error::NUGET_API_KEY secret is not set or is empty. Configure it under Settings > Secrets and variables > Actions."
            exit 1
          fi

          # Sanitize: strip BOM, non-printable characters, whitespace, and surrounding quotes
          NUGET_API_KEY="$(printf '%s' "$NUGET_API_KEY" \
            | sed 's/^\xEF\xBB\xBF//' \
            | tr -cd '[:print:]' \
            | tr -d '[:space:]' \
            | sed "s/^['\"]//; s/['\"]$//")"

          echo "Sanitized API key length: ${#NUGET_API_KEY}"
          if [ "${#NUGET_API_KEY}" -lt 32 ]; then
            echo "::error::NUGET_API_KEY is too short (${#NUGET_API_KEY} chars) after sanitization — NuGet API keys are typically 46 characters. Please re-copy the key from https://www.nuget.org/account/apikeys"
            exit 1
          fi

          echo "::group::Publishing NuGet packages"
          failed=0
          for pkg in artifacts/*.nupkg; do
            echo "Pushing $pkg ..."
            if ! dotnet nuget push "$pkg" \
              --api-key "$NUGET_API_KEY" \
              --source https://api.nuget.org/v3/index.json \
              --skip-duplicate; then
              echo "::error::Failed to push $pkg. Common causes:"
              echo "  1. The API key value in the NUGET_API_KEY secret may be incorrect — re-copy the key from https://www.nuget.org/account/apikeys"
              echo "  2. The API key may not have 'Push' permission for this package — ensure the key's scope includes the package ID or uses the glob pattern '*'"
              echo "  3. The package may be owned by a different NuGet.org account than the key's owner"
              failed=1
            fi
          done
          echo "::endgroup::"
          if [ "$failed" -ne 0 ]; then
            exit 1
          fi

      - name: Upload NuGet artifacts
        uses: actions/upload-artifact@v4
        with:
          name: vitruvian-nuget-packages
          path: artifacts/*.nupkg

  # ── Post-deploy: install and verify the tool starts ─────────────────
  run:
    needs: deploy
    runs-on: ubuntu-latest

    steps:
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Download NuGet artifacts
        uses: actions/download-artifact@v4
        with:
          name: vitruvian-nuget-packages
          path: artifacts

      - name: Install Vitruvian tool from artifact
        run: |
          dotnet tool install --global --add-source artifacts Vitruvian

      - name: Verify Vitruvian starts
        run: |
          node -e "
          const { spawn } = require('child_process');
          const proc = spawn('vitruvian', ['--help'], { stdio: 'pipe' });
          let stdout = '';
          let stderr = '';
          proc.stdout.on('data', d => stdout += d);
          proc.stderr.on('data', d => stderr += d);
          proc.on('close', code => {
            console.log(stdout);
            if (stderr) console.error(stderr);
            if (code !== 0) {
              console.error('Vitruvian exited with code ' + code);
              process.exit(1);
            }
            if (!stdout.includes('Vitruvian CLI arguments')) {
              console.error('Unexpected output — missing help text');
              process.exit(1);
            }
            console.log('✓ Vitruvian started successfully');
          });
          proc.on('error', err => {
            console.error('Failed to start Vitruvian:', err.message);
            process.exit(1);
          });
          "
